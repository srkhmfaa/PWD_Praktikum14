<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Dashboard – Pemrograman Web P14</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .box {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }
    .box-head {
      padding: 1.75rem;
      background: #085041;
    }
    .box-head h2 { font-size: 18px; font-weight: 600; margin: 0 0 2px; color: #E1F5EE; }
    .box-head p  { font-size: 13px; color: #9FE1CB; margin: 0; }

    /* Form */
    .form-area { padding: 1.5rem; }
    .lbl { font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px; }
    .inp-row {
      display: flex; align-items: center;
      border: 1px solid #e2e8f0; border-radius: 8px;
      overflow: hidden; margin-bottom: 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    .inp-row:focus-within { border-color: #085041; box-shadow: 0 0 0 3px #E1F5EE; }
    .inp-row input {
      flex: 1; border: none; background: transparent;
      padding: 9px 10px; font-size: 14px; outline: none; color: #111;
    }
    .inp-row input::placeholder { color: #9ca3af; }
    .eye {
      padding: 0 10px; cursor: pointer; font-size: 15px;
      color: #9ca3af; border: none; background: none;
    }

    /* Strength */
    .sbar-wrap { height: 3px; background: #f1f5f9; border-radius: 3px; margin-bottom: 6px; }
    .sbar { height: 3px; border-radius: 3px; width: 0; transition: width .3s, background .3s; }
    .slbl { font-size: 12px; color: #9ca3af; margin: 0 0 8px; }

    /* Checklist */
    .cklist { margin-bottom: 14px; }
    .ck { font-size: 12px; color: #9ca3af; display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
    .ck.ok { color: #085041; }

    /* Button */
    .sbtn {
      width: 100%; padding: .7rem; border: none; border-radius: 8px;
      background: #085041; color: #E1F5EE;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s;
    }
    .sbtn:hover { opacity: .85; }
    .sbtn:disabled { opacity: .6; cursor: not-allowed; }

    /* Pane */
    .pane { display: none; }
    .pane.active { display: block; }

    /* Alert */
    .alert-box {
      font-size: 13px; padding: 9px 12px;
      border-radius: 8px; margin-bottom: 12px; display: none;
    }
    .alert-success { background: #E1F5EE; color: #085041; display: block; }
    .alert-danger  { background: #fef2f2; color: #dc2626; display: block; }

    /* Switch link */
    .switch-link {
      text-align: center; font-size: 13px;
      margin-top: 1rem; color: #6b7280;
    }
    .switch-link a {
      color: #085041; font-weight: 600; text-decoration: none;
    }
    .switch-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="box m-3">

  <!-- Header -->
  <div class="box-head">
    <h2>Secure Dashboard</h2>
    <p>Pemrograman Web – Pertemuan 14</p>
  </div>

  <div class="form-area">

    <!-- LOGIN -->
    <div class="pane active" id="pane-login">
      <div class="alert-box" id="al-login"></div>

      <label class="lbl">Username atau Email</label>
      <div class="inp-row">
        <input type="text" id="identifier" placeholder="Username atau email">
      </div>

      <label class="lbl">Password</label>
      <div class="inp-row">
        <input type="password" id="lp" placeholder="Password">
        <button class="eye" type="button" onclick="toggleEye('lp', this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>

      <button class="sbtn" id="loginBtn" onclick="submitLogin()">
        <span class="btn-text">Masuk</span>
        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
      </button>

      <p class="switch-link">
        Belum memiliki akun?
        <a href="#" onclick="switchTab('register')">Daftar di sini</a>
      </p>
    </div>

    <!-- REGISTER -->
    <div class="pane" id="pane-register">
      <div class="alert-box" id="al-register"></div>

      <label class="lbl">Nama Lengkap</label>
      <div class="inp-row">
        <input type="text" id="full_name" placeholder="Opsional">
      </div>

      <label class="lbl">Username *</label>
      <div class="inp-row">
        <input type="text" id="username" placeholder="huruf, angka, underscore">
      </div>

      <label class="lbl">Email *</label>
      <div class="inp-row">
        <input type="email" id="email" placeholder="contoh@domain.com">
      </div>

      <label class="lbl">Password *</label>
      <div class="inp-row">
        <input type="password" id="rp" placeholder="Min. 6 karakter" oninput="checkStrength(this.value)">
        <button class="eye" type="button" onclick="toggleEye('rp', this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>

      <div class="sbar-wrap"><div class="sbar" id="sbar"></div></div>
      <p class="slbl" id="slbl">Kekuatan password: —</p>

      <div class="cklist">
        <div class="ck" id="ck-len"><i class="bi bi-x-circle"></i> Min. 6 karakter</div>
        <div class="ck" id="ck-upper"><i class="bi bi-x-circle"></i> Ada huruf kapital</div>
        <div class="ck" id="ck-num"><i class="bi bi-x-circle"></i> Ada angka</div>
        <div class="ck" id="ck-sym"><i class="bi bi-x-circle"></i> Ada karakter spesial (@, #, !)</div>
      </div>

      <button class="sbtn" id="registerBtn" onclick="submitRegister()">
        <span class="btn-text">Daftar Akun</span>
        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
      </button>

      <p class="switch-link">
        Sudah punya akun?
        <a href="#" onclick="switchTab('login')">Login di sini</a>
      </p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

/* ── SWITCH PANE ── */
function switchTab(name) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  // Reset alert saat pindah pane
  document.querySelectorAll('.alert-box').forEach(a => {
    a.className = 'alert-box';
    a.style.display = 'none';
  });
}

/* ── TOGGLE PASSWORD ── */
function toggleEye(id, btn) {
  const input = document.getElementById(id);
  const icon  = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye';
  }
}

/* ── PASSWORD STRENGTH ── */
function checkStrength(v) {
  const rules = [
    { id: 'ck-len',   ok: v.length >= 6 },
    { id: 'ck-upper', ok: /[A-Z]/.test(v) },
    { id: 'ck-num',   ok: /[0-9]/.test(v) },
    { id: 'ck-sym',   ok: /[\W_]/.test(v) },
  ];
  let score = rules.filter(r => r.ok).length;
  rules.forEach(r => {
    const el = document.getElementById(r.id);
    el.classList.toggle('ok', r.ok);
    el.querySelector('i').className = r.ok ? 'bi bi-check-circle-fill' : 'bi bi-x-circle';
  });
  const colors = ['#e5e7eb', '#ef4444', '#f97316', '#eab308', '#085041'];
  const labels = ['—', 'Sangat lemah', 'Lemah', 'Sedang', 'Kuat'];
  document.getElementById('sbar').style.width      = (v.length ? score * 25 : 0) + '%';
  document.getElementById('sbar').style.background = colors[score];
  document.getElementById('slbl').textContent      = 'Kekuatan password: ' + (v.length ? labels[score] : '—');
}

/* ── ALERT ── */
function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'alert-box alert-' + type;
  el.textContent = msg;
}

/* ── LOADING STATE ── */
function setLoading(btn, state) {
  const text    = btn.querySelector('.btn-text');
  const spinner = btn.querySelector('.spinner-border');
  btn.disabled  = state;
  if (!btn._label) btn._label = text.textContent;
  text.textContent = state ? 'Memproses...' : btn._label;
  spinner.classList.toggle('d-none', !state);
}

/* ── SUBMIT LOGIN ── */
async function submitLogin() {
  const btn        = document.getElementById('loginBtn');
  const identifier = document.getElementById('identifier').value.trim();
  const password   = document.getElementById('lp').value;

  if (!identifier || !password) {
    return showAlert('al-login', 'danger', 'Username/email dan password wajib diisi.');
  }

  setLoading(btn, true);

  const fd = new FormData();
  fd.append('identifier', identifier);
  fd.append('password', password);

  try {
    const res  = await fetch('api/login.php', { method: 'POST', body: fd });
    const data = await res.json();
    if (res.ok) {
      showAlert('al-login', 'success', data.message);
      setTimeout(() => window.location.href = data.redirect, 900);
    } else {
      showAlert('al-login', 'danger', data.message);
    }
  } catch {
    showAlert('al-login', 'danger', 'Gagal menghubungi server.');
  } finally {
    setLoading(btn, false);
  }
}

/* ── SUBMIT REGISTER ── */
async function submitRegister() {
  const btn = document.getElementById('registerBtn');

  const fd = new FormData();
  fd.append('full_name', document.getElementById('full_name').value.trim());
  fd.append('username',  document.getElementById('username').value.trim());
  fd.append('email',     document.getElementById('email').value.trim());
  fd.append('password',  document.getElementById('rp').value);

  setLoading(btn, true);

  try {
    const res  = await fetch('api/register.php', { method: 'POST', body: fd });
    const data = await res.json();
    if (res.ok) {
      showAlert('al-register', 'success', data.message);
      // Reset form & pindah ke login setelah 1.5 detik
      document.getElementById('full_name').value = '';
      document.getElementById('username').value  = '';
      document.getElementById('email').value     = '';
      document.getElementById('rp').value        = '';
      checkStrength(''); // reset strength meter
      setTimeout(() => switchTab('login'), 1500);
    } else {
      showAlert('al-register', 'danger', data.message);
    }
  } catch {
    showAlert('al-register', 'danger', 'Gagal menghubungi server.');
  } finally {
    setLoading(btn, false);
  }
}
</script>
</body>
</html>
